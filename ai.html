<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI ENGINE GOD MODE PRO</title>

<style>
body{margin:0;background:#050505;color:#fff;font-family:Arial}
.header{padding:12px;text-align:center;background:#111;color:#C8A84B;font-weight:bold}
.container{padding:10px}
.btn{width:100%;padding:12px;margin:6px 0;background:#111;color:#C8A84B;border:1px solid #333}
.card{background:#111;padding:10px;margin:8px 0;border-radius:8px}
.row{display:flex;gap:5px}
.row button{flex:1}
.badge{font-size:10px;padding:3px 6px;border-radius:6px;margin-right:5px}
.hot{background:red}
.warm{background:orange}
.low{background:#555}
.controls{display:flex;gap:5px;margin-bottom:10px}
.controls select{flex:1;padding:10px;background:#000;color:#fff;border:1px solid #333}
.top{background:#0f0f0f;padding:10px;margin-top:10px}
</style>
</head>

<body>

<div class="header">🔥 AI ENGINE GOD MODE PRO</div>

<div class="container">

<div class="controls">
<select id="mode">
<option value="local">Local</option>
<option value="investor">Investor</option>
<option value="nri">NRI</option>
</select>

<select id="sector">
<option value="all">All</option>
<option value="hospital">Hospital</option>
<option value="petrol bunk">Petrol Bunk</option>
<option value="showroom">Showroom</option>
<option value="warehouse">Warehouse</option>
<option value="resort">Resort</option>
</select>
</div>

<button class="btn" onclick="generate()">⚡ Generate 200+ Queries</button>
<button class="btn" onclick="autoSearch()">🚀 Auto Open Top 3</button>

<div id="top"></div>
<div id="results"></div>

<div id="live" style="margin-top:10px;font-size:12px;">Live Feed: waiting...</div>

</div>

<script>

let generated = [];

function score(q){
let s=40;
if(/urgent|required/i.test(q)) s+=30;
if(/commercial|investor|business/i.test(q)) s+=20;
if(/madurai|alagar/i.test(q)) s+=10;
return s;
}

function label(s){
if(s>=80) return ["HOT","hot"];
if(s>=60) return ["WARM","warm"];
return ["LOW","low"];
}

function generate(){

const mode=document.getElementById("mode").value;
const sectorSel=document.getElementById("sector").value;

const locations=["Madurai","Alagar Kovil","Natham Road","Tamil Nadu"];
const intents=["land required","plot wanted","commercial land needed","urgent land required","land for business"];
const sectors=["hospital","petrol bunk","showroom","warehouse","resort","hotel","college"];

const buyers={
local:["buyer","business owner"],
investor:["investor","developer"],
nri:["NRI investor","overseas buyer"]
};

let queries=[];

locations.forEach(l=>{
intents.forEach(i=>{
sectors.forEach(s=>{
if(sectorSel!=="all" && s!==sectorSel) return;
buyers[mode].forEach(b=>{
queries.push(`${l} ${i} for ${s} ${b}`);
queries.push(`${l} ${s} ${b} ${i}`);
});
});
});
});

let expanded=[];
queries.forEach(q=>{
expanded.push(q);
expanded.push(q+" urgent");
expanded.push(q.replace("required","needed"));
});

generated=[...new Set(expanded)];

let scored=generated.map(q=>({q,s:score(q)})).sort((a,b)=>b.s-a.s);

render(scored);
}

function render(list){

let topHTML="<h3>🔥 TOP OPPORTUNITIES</h3>";
list.slice(0,10).forEach(x=>{
let [l,c]=label(x.s);
topHTML+=`<div class="card"><span class="badge ${c}">${l}</span> ${x.q}</div>`;
});

document.getElementById("top").innerHTML=topHTML;

let html="";
list.slice(0,120).forEach(x=>{
let [l,c]=label(x.s);

html+=`
<div class="card">
<span class="badge ${c}">${l}</span> ${x.q}
<div class="row">
<button onclick="search('${x.q}')">Search</button>
<button onclick="copy('${x.q}')">Copy</button>
</div>
</div>`;
});

document.getElementById("results").innerHTML=html;
}

function search(q){
window.open("https://www.google.com/search?q="+encodeURIComponent(q));
}

function copy(q){
navigator.clipboard.writeText(q);
alert("Copied");
}

function autoSearch(){
generated.slice(0,3).forEach((q,i)=>{
setTimeout(()=>search(q), i*1500);
});
}

setInterval(()=>{
let arr=[
"Investor looking for land",
"Urgent commercial plot needed",
"NRI investment inquiry",
"Business expansion land required"
];
let msg=arr[Math.floor(Math.random()*arr.length)];
document.getElementById("live").innerText="Live Feed: "+msg;
},3000);

</script>

</body>
</html>
