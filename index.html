<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V2 INTELLIGENCE CONTROLLER</title>

<style>
body{margin:0;background:#050505;color:#fff;font-family:Arial}
.header{padding:12px;text-align:center;background:#111;color:#C8A84B;font-weight:bold}
.tabs{display:flex}
.tabs button{flex:1;padding:10px;background:#000;color:#aaa;border:none}
.tabs button.active{color:#C8A84B;border-bottom:2px solid #C8A84B}
iframe{width:100%;height:60vh;border:none}
.panel{display:none}
.panel.active{display:block}
.bar{display:flex;gap:5px;padding:10px;background:#111;flex-wrap:wrap}
.bar button{flex:1;padding:10px;background:#000;color:#C8A84B;border:1px solid #333}
textarea{width:100%;height:90px;background:#000;color:#fff;padding:10px}
.card{background:#111;padding:10px;margin:5px;border-radius:8px}
.hot{color:red}
.warm{color:orange}
.low{color:#aaa}
.tag{font-size:10px;color:#aaa}
.alert{background:red;padding:5px;text-align:center;font-weight:bold}
</style>
</head>

<body>

<div class="header">🚀 V2 DEAL INTELLIGENCE SYSTEM</div>

<div class="tabs">
<button onclick="openTab('original',this)" class="active">Original</button>
<button onclick="openTab('crm',this)">CRM</button>
<button onclick="openTab('ai',this)">AI</button>
<button onclick="openTab('memory',this)">Memory</button>
</div>

<div class="bar">
<button onclick="capture()">📥 Capture</button>
<button onclick="saveLead()">Save</button>
<button onclick="sendToCRM()">Send CRM</button>
<button onclick="whatsapp()">WhatsApp</button>
<button onclick="pipeline()">⚡ Close</button>
</div>

<div id="alertBox"></div>

<div id="original" class="panel active">
<iframe src="original.html"></iframe>
</div>

<div id="crm" class="panel">
<iframe id="crmFrame" src="crm.html"></iframe>
</div>

<div id="ai" class="panel">
<iframe src="ai.html"></iframe>
</div>

<div id="memory" class="panel">
<textarea id="leadBox" placeholder="Paste or capture lead"></textarea>
<div id="score"></div>
<div id="list"></div>
</div>

<script>

let leads = JSON.parse(localStorage.getItem("leads")||"[]");

function openTab(tab,el){
document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
document.getElementById(tab).classList.add("active");
document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
}

async function capture(){
let text = await navigator.clipboard.readText();
document.getElementById("leadBox").value = text;
autoScore(text);
}

function autoScore(text){
let s=30;

if(/urgent|required/i.test(text)) s+=30;
if(/budget|lakhs|crore/i.test(text)) s+=20;
if(/commercial|business|investor/i.test(text)) s+=20;
if(/madurai|alagar/i.test(text)) s+=15;

return s;
}

function label(s){
if(s>=80) return ["🔥 HOT","hot"];
if(s>=50) return ["🟠 WARM","warm"];
return ["⚪ LOW","low"];
}

function tag(text){
let t=[];
if(/hospital/i.test(text)) t.push("Hospital");
if(/petrol/i.test(text)) t.push("Petrol");
if(/investor/i.test(text)) t.push("Investor");
return t.join(", ");
}

function saveLead(){
let text=document.getElementById("leadBox").value;
if(!text) return alert("Paste lead");

let s=autoScore(text);

let lead={
text,
score:s,
time:Date.now(),
tag:tag(text),
lastContact:0
};

leads.push(lead);
localStorage.setItem("leads",JSON.stringify(leads));

if(s>=80){
document.getElementById("alertBox").innerHTML="<div class='alert'>🔥 HOT LEAD - ACT NOW</div>";
}

render();
}

function render(){
leads.sort((a,b)=>b.score-a.score);

let html="";
leads.forEach(l=>{
let [lab,cls]=label(l.score);

html+=`<div class="card">
<span class="${cls}">${lab}</span> (${l.score})<br>
<span class="tag">${l.tag}</span><br>
${l.text}
</div>`;
});

document.getElementById("list").innerHTML=html;
}

function sendToCRM(){
let text=document.getElementById("leadBox").value;
if(!text) return;

openTab('crm',document.querySelectorAll(".tabs button")[1]);
document.getElementById("crmFrame").contentWindow.postMessage(text,"*");
}

function generateReply(text){
if(/urgent/i.test(text)) return "Hi, saw your urgent requirement. We have prime commercial corner plot near Alagar Kovil. Shall we discuss immediately?";
return "Hi, we have premium commercial land near Alagar Kovil. Interested?";
}

function whatsapp(){
let text=document.getElementById("leadBox").value;
let msg=generateReply(text);
window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

function pipeline(){
saveLead();
sendToCRM();
whatsapp();
}

setInterval(()=>{
let now=Date.now();
leads.forEach(l=>{
if(l.lastContact===0 && now-l.time>21600000){ // 6 hrs
document.getElementById("alertBox").innerHTML="<div class='alert'>⏰ Follow up lead</div>";
}
});
},60000);

document.getElementById("leadBox").addEventListener("input",()=>{
let text=document.getElementById("leadBox").value;
let s=autoScore(text);
let [lab,cls]=label(s);
document.getElementById("score").innerHTML="Score: "+s+" "+lab;
});

render();

</script>

</body>
</html>
